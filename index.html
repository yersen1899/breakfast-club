<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Breakfast Club | Topics</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #128c7e;
            --primary-hover: #16aa96;
            --bg: #f3f7f7;
            --card-bg: #ffffff;
            --text: #1a1e1e;
            --text-light: #6e7a7a;
            --success: #27ae60;
            --danger: #e74c3c;
        }

        body { font-family: -apple-system, sans-serif; background: var(--bg); padding: 20px; color: var(--text); line-height: 1.6; }
        .container { max-width: 600px; margin: 0 auto; }
        h1 { text-align: center; font-weight: 800; font-size: 2.2rem; margin-bottom: 35px; }
        .card { background: var(--card-bg); padding: 24px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.03); margin-bottom: 24px; }
        h2 { font-size: 1.05rem; font-weight: 700; margin-bottom: 20px; text-transform: uppercase; color: var(--text-light); border-bottom: 2px solid #f0f4f4; padding-bottom: 10px; }
        .row { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        input, select { padding: 13px; border-radius: 12px; border: 2px solid #e1eaea; flex-grow: 1; outline: none; }
        button { padding: 13px 20px; border-radius: 12px; background: var(--primary); color: white; border: none; font-weight: 700; cursor: pointer; transition: 0.15s; }
        button:hover { transform: translateY(-1.5px); opacity: 0.9; }
        
        .list-item { background: #fff; padding: 15px; border-radius: 14px; margin-bottom: 10px; border: 1px solid #f0f4f4; display: flex; justify-content: space-between; align-items: center; }
        .meta { font-size: 0.8rem; color: var(--text-light); display: block; }

        /* Themen-Spezifisch */
        .topic-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .topic-column h3 { font-size: 0.9rem; margin-bottom: 15px; text-align: center; }
        .good-title { color: var(--success); }
        .bad-title { color: var(--danger); }
        
        .good-item { border-left: 4px solid var(--success); background: #fafffb; }
        .bad-item { border-left: 4px solid var(--danger); background: #fff9f9; }

        /* Modal Styles */
        #orderModal {
            display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.5); align-items: center; justify-content: center;
        }
        .modal-content { background: white; padding: 30px; border-radius: 20px; width: 90%; max-width: 400px; }
        
        .delete-btn { background: transparent; color: #cedada; padding: 5px; margin-left: 10px; }
        .delete-btn:hover { color: var(--danger); }

        @media (max-width: 500px) { .topic-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="container">
        <h1>☕ Breakfast Club 🥐</h1>

        <div class="card">
            <h2>📅 Termin-Voting</h2>
            <div class="row">
                <input type="date" id="dateInput">
                <input type="text" id="dateUser" placeholder="Dein Name">
                <button onclick="addDate()">Dazu</button>
            </div>
            <div id="dateList"></div>
        </div>

        <div class="card">
            <h2>🛒 Wer bringt was / Bestellung</h2>
            <div class="row">
                <input type="text" id="itemName" placeholder="Was bringst du mit?">
                <input type="number" id="itemQty" placeholder="Menge" value="0" style="width: 80px;">
                <input type="text" id="userName" placeholder="Dein Name">
                <button onclick="addItem()">Anbieten</button>
            </div>
            <div id="itemList"></div>
        </div>

        <div class="card">
            <h2>💬 Themen-Check</h2>
            <div class="row">
                <input type="text" id="topicInput" placeholder="Worüber sprechen wir?">
                <select id="topicType">
                    <option value="good">👍 Besprechen</option>
                    <option value="bad">🚫 Tabu heute</option>
                </select>
                <button onclick="addTopic()">Posten</button>
            </div>

            <div class="topic-grid">
                <div class="topic-column">
                    <h3 class="good-title">✅ Redebedarf</h3>
                    <div id="goodTopics"></div>
                </div>
                <div class="topic-column">
                    <h3 class="bad-title">❌ Lieber nicht</h3>
                    <div id="badTopics"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="orderModal">
        <div class="modal-content">
            <h3>Neue Bestellung</h3>
            <div style="display: flex; flex-direction: column; gap: 10px;">
                <input type="text" id="modalName" placeholder="Dein Name / Familie">
                <input type="number" id="modalQty" placeholder="Anzahl Stück" value="1">
            </div>
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button id="confirmOrderBtn">Bestellung abschicken</button>
                <button style="background: #cedada; color: #1a1e1e;" onclick="closeModal()">Abbrechen</button>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://zcqtnwcdcdbmgqfdpjbs.supabase.co";
        const SUPABASE_KEY = "sb_publishable_VoFrsNhdsOjn6XtFTNcWjw_l07gzT-Y";
        const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentActiveItem = {};

        async function loadAll() {
            // Termine
            const { data: dates } = await db.from('dates').select('*').order('votes', { ascending: false });
            render('dateList', dates, d => `<div class="list-item"><div><strong>${new Date(d.value).toLocaleDateString('de-DE')}</strong><span class="meta">Von ${d.created_by}</span></div><div><span>⭐ ${d.votes}</span> <button style="background:#e8f4f2; color:var(--primary); padding:8px;" onclick="voteDate(${d.id}, ${d.votes})">Vote</button></div></div>`);

            // Items
            const { data: items } = await db.from('items').select('*').order('id', { ascending: false });
            render('itemList', items, i => `<div class="list-item"><div><strong>${i.qty}x ${i.name}</strong><span class="meta">Von: ${i.user_name}</span>${i.wanted_by ? `<span class="meta" style="color:var(--primary); font-weight:600;">Bestellt: ${i.wanted_by}</span>` : ''}</div><div style="display:flex; align-items:center;"><button style="background:#e8f4f2; color:var(--primary); font-size:0.8rem; padding:8px;" onclick="openModal(${i.id}, ${i.qty}, '${i.wanted_by || ''}')">Bestellen</button><button class="delete-btn" onclick="deleteEntry('items', ${i.id})">✕</button></div></div>`);

            // Themen (Getrennt laden)
            const { data: topics } = await db.from('topics').select('*').order('id', { ascending: false });
            const good = topics?.filter(t => t.type === 'good') || [];
            const bad = topics?.filter(t => t.type === 'bad') || [];
            
            render('goodTopics', good, t => `<div class="list-item good-item"><span>${t.text}</span><button class="delete-btn" onclick="deleteEntry('topics', ${t.id})">✕</button></div>`);
            render('badTopics', bad, t => `<div class="list-item bad-item"><span>${t.text}</span><button class="delete-btn" onclick="deleteEntry('topics', ${t.id})">✕</button></div>`);
        }

        function render(id, data, template) {
            document.getElementById(id).innerHTML = data?.length ? data.map(template).join('') : '<p style="color:#ccc; text-align:center; font-size:0.8rem;">Leer</p>';
        }

        async function addTopic() {
            const text = document.getElementById('topicInput').value;
            const type = document.getElementById('topicType').value;
            if (text) { await db.from('topics').insert([{ text, type }]); document.getElementById('topicInput').value = ""; loadAll(); }
        }

        // Modal Logik
        function openModal(id, qty, wishes) { currentActiveItem = {id, qty, wishes}; document.getElementById('orderModal').style.display = 'flex'; }
        function closeModal() { document.getElementById('orderModal').style.display = 'none'; }
        
        document.getElementById('confirmOrderBtn').onclick = async function() {
            const name = document.getElementById('modalName').value;
            const num = parseInt(document.getElementById('modalQty').value);
            if (name && num > 0) {
                const entry = `${name} (${num}x)`;
                const wishes = currentActiveItem.wishes ? currentActiveItem.wishes + ", " + entry : entry;
                await db.from('items').update({ qty: currentActiveItem.qty + num, wanted_by: wishes }).eq('id', currentActiveItem.id);
                closeModal(); loadAll();
            }
        };

        async function addDate() {
            const v = document.getElementById('dateInput').value;
            const u = document.getElementById('dateUser').value;
            if (v && u) { await db.from('dates').insert([{ value: v, created_by: u, votes: 0 }]); loadAll(); }
        }

        async function voteDate(id, v) { await db.from('dates').update({ votes: v + 1 }).eq('id', id); loadAll(); }

        async function addItem() {
            const n = document.getElementById('itemName').value;
            const q = parseInt(document.getElementById('itemQty').value) || 0;
            const u = document.getElementById('userName').value;
            if (n && u) { await db.from('items').insert([{ name: n, qty: q, user_name: u }]); loadAll(); }
        }

        async function deleteEntry(table, id) { if (confirm('Löschen?')) { await db.from(table).delete().eq('id', id); loadAll(); } }

        loadAll();
    </script>
</body>
</html>
