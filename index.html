<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Breakfast Club | Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #128c7e;
            --primary-hover: #16aa96;
            --bg: #f3f7f7;
            --card-bg: #ffffff;
            --text: #1a1e1e;
            --text-light: #6e7a7a;
            --success: #27ae60;
        }

        body { font-family: -apple-system, sans-serif; background: var(--bg); padding: 20px; color: var(--text); line-height: 1.6; }
        .container { max-width: 600px; margin: 0 auto; }
        h1 { text-align: center; font-weight: 800; font-size: 2.2rem; margin-bottom: 35px; }
        .card { background: var(--card-bg); padding: 24px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.03); margin-bottom: 24px; }
        h2 { font-size: 1.05rem; font-weight: 700; margin-bottom: 20px; text-transform: uppercase; color: var(--text-light); }
        .row { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        input, select { padding: 13px; border-radius: 12px; border: 2px solid #e1eaea; flex-grow: 1; outline: none; }
        button { padding: 13px 20px; border-radius: 12px; background: var(--primary); color: white; border: none; font-weight: 700; cursor: pointer; transition: 0.15s; }
        button:hover { transform: translateY(-1.5px); opacity: 0.9; }
        .list-item { background: #fff; padding: 15px; border-radius: 14px; margin-bottom: 10px; border: 1px solid #f0f4f4; display: flex; justify-content: space-between; align-items: center; }
        .plus-btn { background: #e8f4f2; color: var(--primary); font-size: 1.2rem; padding: 5px 15px; margin-left: 10px; }
        .delete-btn { background: transparent; color: #cedada; padding: 5px; margin-left: 10px; }
        .delete-btn:hover { color: #ff4757; }
        .meta { font-size: 0.8rem; color: var(--text-light); display: block; }
        .voted { border-left: 4px solid var(--success); }
        .bad { background: #fff9f9; } .good { background: #fafffb; }
    </style>
</head>
<body>
    <div class="container">
        <h1>☕ Breakfast Club 🥐</h1>

        <div class="card">
            <h2>📅 Termin-Voting</h2>
            <div class="row">
                <input type="date" id="dateInput">
                <input type="text" id="dateUser" placeholder="Dein Name">
                <button onclick="addDate()">Dazu</button>
            </div>
            <div id="dateList"></div>
        </div>

        <div class="card">
            <h2>🛒 Wer bringt was / Bestellungen</h2>
            <div class="row">
                <input type="text" id="itemName" placeholder="Was? (z.B. Brötchen)">
                <input type="number" id="itemQty" placeholder="Start-Menge" value="1" style="width: 80px;">
                <input type="text" id="userName" placeholder="Dein Name">
                <button onclick="addItem()">Anbieten</button>
            </div>
            <div id="itemList"></div>
        </div>

        <div class="card">
            <h2>💬 Themen</h2>
            <div class="row">
                <input type="text" id="topicInput" placeholder="Thema...">
                <select id="topicType"><option value="good">👍 Ja!</option><option value="bad">🚫 Nein</option></select>
                <button onclick="addTopic()">Post</button>
            </div>
            <div id="topicList"></div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://zcqtnwcdcdbmgqfdpjbs.supabase.co";
        const SUPABASE_KEY = "sb_publishable_VoFrsNhdsOjn6XtFTNcWjw_l07gzT-Y";
        const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function loadAll() {
            // Termine
            const { data: dates } = await db.from('dates').select('*').order('votes', { ascending: false });
            render('dateList', dates, d => `
                <div class="list-item ${JSON.parse(localStorage.getItem('myVotes') || '[]').includes(d.id) ? 'voted' : ''}">
                    <div><strong>${new Date(d.value).toLocaleDateString('de-DE')}</strong><span class="meta">Von ${d.created_by}</span></div>
                    <div><span>⭐ ${d.votes}</span> <button class="plus-btn" onclick="voteDate(${d.id}, ${d.votes})">👍</button></div>
                </div>`);

            // Items / Bestellungen
            const { data: items } = await db.from('items').select('*').order('id', { ascending: false });
            render('itemList', items, i => `
                <div class="list-item">
                    <div>
                        <strong style="font-size:1.1rem;">${i.qty}x ${i.name}</strong>
                        <span class="meta">Besorgt von: ${i.user_name}</span>
                        ${i.wanted_by ? `<span class="meta" style="color:var(--primary)">Zusatzwünsche von: ${i.wanted_by}</span>` : ''}
                    </div>
                    <div style="display:flex; align-items:center;">
                        <button class="plus-btn" onclick="orderMore(${i.id}, ${i.qty}, '${i.wanted_by || ''}')">+1</button>
                        <button class="delete-btn" onclick="deleteEntry('items', ${i.id})">✕</button>
                    </div>
                </div>`);

            // Themen
            const { data: topics } = await db.from('topics').select('*').order('id', { ascending: false });
            render('topicList', topics, t => `<div class="list-item ${t.type}"><span>${t.text}</span><button class="delete-btn" onclick="deleteEntry('topics', ${t.id})">✕</button></div>`);
        }

        function render(id, data, template) {
            document.getElementById(id).innerHTML = data?.length ? data.map(template).join('') : '<p style="color:#ccc; text-align:center;">Noch leer...</p>';
        }

        async function addItem() {
            const name = document.getElementById('itemName').value;
            const qty = document.getElementById('itemQty').value;
            const user = document.getElementById('userName').value;
            if (name && user) { await db.from('items').insert([{ name, qty, user_name: user }]); loadAll(); }
        }

        async function orderMore(id, currentQty, currentWishes) {
            const myName = prompt("Wer möchte noch eins?");
            if (myName) {
                const newWishes = currentWishes ? currentWishes + ", " + myName : myName;
                await db.from('items').update({ qty: currentQty + 1, wanted_by: newWishes }).eq('id', id);
                loadAll();
            }
        }

        async function addDate() {
            const val = document.getElementById('dateInput').value;
            const user = document.getElementById('dateUser').value;
            if (val && user) { await db.from('dates').insert([{ value: val, created_by: user, votes: 0 }]); loadAll(); }
        }

        async function voteDate(id, v) {
            await db.from('dates').update({ votes: v + 1 }).eq('id', id);
            loadAll();
        }

        async function addTopic() {
            const text = document.getElementById('topicInput').value;
            const type = document.getElementById('topicType').value;
            if (text) { await db.from('topics').insert([{ text, type }]); loadAll(); }
        }

        async function deleteEntry(table, id) {
            if (confirm('Löschen?')) { await db.from(table).delete().eq('id', id); loadAll(); }
        }

        loadAll();
    </script>
</body>
</html>
