<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Breakfast Club | New Look</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            /* Die neue Petrol-Palette */
            --primary: #128c7e;          /* Petrol-Grün */
            --primary-hover: #16aa96;   /* Etwas heller beim Drüberfahren */
            
            --bg: #f3f7f7;               /* Sehr helles Grau-Grün */
            --card-bg: #ffffff;
            --text: #1a1e1e;
            --text-light: #6e7a7a;
            --success: #27ae60;         /* Abstimm-Grün bleibt */
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background: var(--bg); 
            padding: 20px; 
            color: var(--text);
            line-height: 1.6;
        }

        .container { max-width: 600px; margin: 0 auto; }

        h1 { 
            text-align: center; 
            font-weight: 800; 
            font-size: 2.2rem; 
            margin-bottom: 35px; 
            letter-spacing: -1px;
            color: var(--text);
        }

        .card { 
            background: var(--card-bg); 
            padding: 24px; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.03); 
            margin-bottom: 24px; 
            border: 1px solid rgba(0,0,0,0.015);
        }

        h2 { 
            font-size: 1.05rem; 
            font-weight: 700; 
            margin-top: 0; 
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            color: var(--text-light);
        }

        .row { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }

        input, select { 
            padding: 13px 16px; 
            border-radius: 12px; 
            border: 2px solid #e1eaea; 
            background: #fbfdfd;
            font-size: 0.95rem; 
            flex-grow: 1;
            transition: all 0.2s;
            outline: none;
        }

        input:focus { border-color: var(--primary); background: #fff; }

        button { 
            padding: 13px 20px; 
            border-radius: 12px; 
            background: var(--primary); 
            color: white; 
            border: none; 
            font-weight: 700; 
            cursor: pointer; 
            transition: all 0.15s;
            box-shadow: 0 3px 8px rgba(18, 140, 126, 0.15);
        }

        button:hover { transform: translateY(-1.5px); background: var(--primary-hover); box-shadow: 0 5px 12px rgba(18, 140, 126, 0.25); }
        button:active { transform: translateY(0); }

        .list-item { 
            background: #fff; 
            padding: 15px; 
            border-radius: 14px; 
            margin-bottom: 10px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border: 1px solid #f0f4f4;
            transition: all 0.15s;
        }

        .list-item:hover { border-color: #d1dadb; transform: scale(1.005); }

        .vote-btn { background: var(--success); box-shadow: 0 3px 8px rgba(39, 174, 96, 0.15); }
        .vote-btn:hover { background: #2ecc71; box-shadow: 0 5px 12px rgba(39, 174, 96, 0.25); }

        .unvote-btn { background: #cbd4d4; color: #3c4545; box-shadow: none; }
        .unvote-btn:hover { background: #aebaba; }

        .delete-btn { background: #fbfdfd; color: #a1b0b0; padding: 7px 11px; font-size: 0.8rem; box-shadow: none; margin-left: 8px; }
        .delete-btn:hover { background: #ffeded; color: #ff4757; }

        .meta { font-size: 0.82rem; color: var(--text-light); margin-top: 3px; display: block; }
        .voted { border-left: 4px solid var(--success); }
        
        /* Bad Topic Style */
        .bad { background: #fff9f9; border-color: #ffeaea; }
        .good { background: #fafffb; border-color: #eafaea; }

        @media (max-width: 480px) {
            .row { flex-direction: column; }
            button { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>☕ Breakfast Club 🥐</h1>

        <div class="card">
            <h2>📅 Termin-Voting</h2>
            <div class="row">
                <input type="date" id="dateInput">
                <input type="text" id="dateUser" placeholder="Dein Name">
                <button onclick="addDate()">Dazu</button>
            </div>
            <div id="dateList"></div>
        </div>

        <div class="card">
            <h2>🛒 Wer bringt was?</h2>
            <div class="row">
                <input type="text" id="itemName" placeholder="Was? (z.B. Honig)">
                <input type="number" id="itemQty" placeholder="Stk" style="width: 80px;">
                <input type="text" id="userName" placeholder="Name">
                <button onclick="addItem()">Eintragen</button>
            </div>
            <div id="itemList"></div>
        </div>

        <div class="card">
            <h2>💬 Themen-Check</h2>
            <div class="row">
                <input type="text" id="topicInput" placeholder="Idee...">
                <select id="topicType">
                    <option value="good">👍 Ja!</option>
                    <option value="bad">🚫 Nein</option>
                </select>
                <button onclick="addTopic()">Post</button>
            </div>
            <div id="topicList"></div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://zcqtnwcdcdbmgqfdpjbs.supabase.co";
        const SUPABASE_KEY = "sb_publishable_VoFrsNhdsOjn6XtFTNcWjw_l07gzT-Y";
        const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function hasVoted(id) {
            const votes = JSON.parse(localStorage.getItem('myVotes') || '[]');
            return votes.includes(id);
        }

        async function loadAll() {
            const { data: dates } = await db.from('dates').select('*').order('votes', { ascending: false });
            render('dateList', dates, d => {
                const voted = hasVoted(d.id);
                return `
                <div class="list-item ${voted ? 'voted' : ''}">
                    <div>
                        <strong style="font-size: 1.05rem;">${new Date(d.value).toLocaleDateString('de-DE', { weekday: 'short', day: '2-digit', month: '2-digit' })}</strong>
                        <span class="meta">Von ${d.created_by || 'Anonym'}</span>
                    </div>
                    <div style="display:flex; align-items:center;">
                        <span style="font-weight:800; margin-right:12px;">${d.votes || 0} ⭐</span>
                        ${voted 
                            ? `<button class="unvote-btn" onclick="unvoteDate(${d.id}, ${d.votes || 0})">Rückgängig</button>`
                            : `<button class="vote-btn" onclick="voteDate(${d.id}, ${d.votes || 0})">Vote</button>`
                        }
                        <button class="delete-btn" onclick="deleteEntry('dates', ${d.id})">✕</button>
                    </div>
                </div>
            `});

            const { data: items } = await db.from('items').select('*').order('id', { ascending: false });
            render('itemList', items, i => `
                <div class="list-item">
                    <span><strong>${i.qty}x ${i.name}</strong><br><span class="meta">von ${i.user_name}</span></span> 
                    <button class="delete-btn" onclick="deleteEntry('items', ${i.id})">✕</button>
                </div>`);

            const { data: topics } = await db.from('topics').select('*').order('id', { ascending: false });
            render('topicList', topics, t => `
                <div class="list-item ${t.type}">
                    <span>${t.text}</span> 
                    <button class="delete-btn" onclick="deleteEntry('topics', ${t.id})">✕</button>
                </div>`);
        }

        function render(id, data, template) {
            document.getElementById(id).innerHTML = data?.length ? data.map(template).join('') : '<p style="color:#b2bec3; text-align:center; font-size:0.9rem;">Noch leer...</p>';
        }

        async function addDate() {
            const val = document.getElementById('dateInput').value;
            const user = document.getElementById('dateUser').value;
            if (val && user) { await db.from('dates').insert([{ value: val, created_by: user, votes: 0 }]); loadAll(); }
        }

        async function voteDate(id, currentVotes) {
            if (hasVoted(id)) return;
            await db.from('dates').update({ votes: currentVotes + 1 }).eq('id', id);
            let votes = JSON.parse(localStorage.getItem('myVotes') || '[]');
            votes.push(id);
            localStorage.setItem('myVotes', JSON.stringify(votes));
            loadAll();
        }

        async function unvoteDate(id, currentVotes) {
            await db.from('dates').update({ votes: Math.max(0, currentVotes - 1) }).eq('id', id);
            let votes = JSON.parse(localStorage.getItem('myVotes') || '[]');
            votes = votes.filter(v => v !== id);
            localStorage.setItem('myVotes', JSON.stringify(votes));
            loadAll();
        }

        async function addItem() {
            const name = document.getElementById('itemName').value;
            const qty = document.getElementById('itemQty').value || 1;
            const user = document.getElementById('userName').value;
            if (name && user) { await db.from('items').insert([{ name, qty, user_name: user }]); loadAll(); }
        }

        async function addTopic() {
            const text = document.getElementById('topicInput').value;
            const type = document.getElementById('topicType').value;
            if (text) { await db.from('topics').insert([{ text, type }]); loadAll(); }
        }

        async function deleteEntry(table, id) {
            if (confirm('Löschen?')) { await db.from(table).delete().eq('id', id); loadAll(); }
        }

        loadAll();
    </script>
</body>
</html>
